<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kelime Uzayı 🚀</title>
    <style>
        :root {
            --bg: #020617; --text: #f8fafc; --key-bg: #1e293b;
            --correct: #10b981; --present: #f59e0b; --absent: #334155;
            --border: #475569;
        }
        * { box-sizing: border-box; }
        body {
            background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0;
            overflow: hidden; touch-action: manipulation;
        }
        .header { text-align: center; padding: 15px; width: 100%; border-bottom: 1px solid #1e293b; }
        .header h1 { margin: 0; font-size: 1.8rem; background: linear-gradient(135deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; letter-spacing: 1px; }
        
        .grid-container {
            display: flex; flex-direction: column; gap: 8px; padding: 20px;
            flex-grow: 1; justify-content: center; width: 100%; max-width: 400px;
        }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .tile {
            border: 2px solid var(--border); display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: 800; text-transform: uppercase; height: 65px;
            transition: all 0.2s; border-radius: 10px; background: rgba(15, 23, 42, 0.6);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .tile[data-state="correct"] { background: var(--correct); border-color: var(--correct); color: #000; }
        .tile[data-state="present"] { background: var(--present); border-color: var(--present); color: #000; }
        .tile[data-state="absent"] { background: var(--absent); border-color: var(--absent); opacity: 0.7; }
        .tile[data-state="active"] { border-color: #94a3b8; transform: scale(1.02); }
        .tile.flip { transform: rotateX(90deg); }
        
        .keyboard {
            display: flex; flex-direction: column; gap: 10px; padding: 15px; width: 100%;
            max-width: 600px; background: #0f172a; border-top: 1px solid #1e293b;
        }
        .key-row { display: flex; justify-content: center; gap: 8px; }
        .key {
            background: var(--key-bg); color: white; border: none; padding: 18px 0;
            border-radius: 8px; cursor: pointer; font-weight: 700; flex: 1; text-transform: uppercase;
            font-size: 0.95rem; transition: all 0.1s; box-shadow: 0 2px 0 #0f172a;
        }
        .key:active { transform: translateY(2px); box-shadow: none; }
        .key.large { flex: 1.5; font-size: 0.8rem; background: #334155; }
        .key[data-state="correct"] { background: var(--correct); }
        .key[data-state="present"] { background: var(--present); }
        .key[data-state="absent"] { background: var(--absent); opacity: 0.4; }

        .message {
            position: absolute; top: 15%; background: #f8fafc; color: #0f172a; padding: 12px 24px;
            border-radius: 8px; font-weight: 800; display: none; z-index: 10; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-transform: uppercase; letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>KELİME UZAYI</h1>
    </div>
    <div class="message" id="message"></div>
    <div class="grid-container" id="grid"></div>
    
    <div class="keyboard" id="keyboard">
        <div class="key-row">
            <button class="key" data-key="e">e</button><button class="key" data-key="r">r</button>
            <button class="key" data-key="t">t</button><button class="key" data-key="y">y</button>
            <button class="key" data-key="u">u</button><button class="key" data-key="ı">ı</button>
            <button class="key" data-key="o">o</button><button class="key" data-key="p">p</button>
            <button class="key" data-key="ğ">ğ</button><button class="key" data-key="ü">ü</button>
        </div>
        <div class="key-row">
            <button class="key" data-key="a">a</button><button class="key" data-key="s">s</button>
            <button class="key" data-key="d">d</button><button class="key" data-key="f">f</button>
            <button class="key" data-key="g">g</button><button class="key" data-key="h">h</button>
            <button class="key" data-key="j">j</button><button class="key" data-key="k">k</button>
            <button class="key" data-key="l">l</button><button class="key" data-key="ş">ş</button>
            <button class="key" data-key="i">i</button>
        </div>
        <div class="key-row">
            <button class="key large" data-key="Enter">GİR</button>
            <button class="key" data-key="z">z</button><button class="key" data-key="c">c</button>
            <button class="key" data-key="v">v</button><button class="key" data-key="b">b</button>
            <button class="key" data-key="n">n</button><button class="key" data-key="m">m</button>
            <button class="key" data-key="ö">ö</button><button class="key" data-key="ç">ç</button>
            <button class="key large" data-key="Backspace">⌫</button>
        </div>
    </div>

    <script>
        // Massive Turkish Dictionary
        let words = [];
        fetch('words.json')
            .then(response => response.json())
            .then(data => {
                words = data.filter(w => w.length === 5 && w.match(/^[A-ZĞÜŞİÖÇ]+$/));
                initGame();
            });

        let TARGET, currentRow, currentTile, grid, guessRows;

        function initGame() {
            TARGET = words[Math.floor(Math.random() * words.length)];
            currentRow = 0;
            currentTile = 0;
            grid = document.getElementById('grid');
            guessRows = Array(6).fill().map(() => Array(5).fill(''));
            createGrid();
        }

        function createGrid() {
            for (let i = 0; i < 6; i++) {
                const row = document.createElement('div');
                row.className = 'row';
                for (let j = 0; j < 5; j++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    row.appendChild(tile);
                }
                grid.appendChild(row);
            }
        }

        function showMessage(msg) {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.style.display = 'block';
            el.style.animation = 'none';
            el.offsetHeight; /* trigger reflow */
            el.style.animation = 'shake 0.5s';
            setTimeout(() => el.style.display = 'none', 2000);
        }

        function updateGrid() {
            const row = grid.children[currentRow];
            for (let i = 0; i < 5; i++) {
                row.children[i].textContent = guessRows[currentRow][i];
                row.children[i].setAttribute('data-state', guessRows[currentRow][i] ? 'active' : '');
            }
        }

        function handleKey(key) {
            if (key === 'Enter') {
                submitGuess();
            } else if (key === 'Backspace') {
                if (currentTile > 0) {
                    currentTile--;
                    guessRows[currentRow][currentTile] = '';
                    updateGrid();
                }
            } else if (/^[a-zA-ZğüşıöçĞÜŞİÖÇ]$/.test(key) && currentTile < 5) {
                guessRows[currentRow][currentTile] = key.toLocaleUpperCase('tr');
                currentTile++;
                updateGrid();
            }
        }

        function submitGuess() {
            const guess = guessRows[currentRow].join('');
            
            if (guess.length !== 5) return showMessage("Eksik harf!");
            if (!words.includes(guess)) return showMessage("Bu kelime listede yok!");

            const targetArr = TARGET.split('');
            const guessArr = guess.split('');
            const states = Array(5).fill('absent');
            const targetCounts = {};
            targetArr.forEach(l => targetCounts[l] = (targetCounts[l] || 0) + 1);

            // First pass: Greens
            guessArr.forEach((l, i) => {
                if (l === targetArr[i]) {
                    states[i] = 'correct';
                    targetCounts[l]--;
                }
            });

            // Second pass: Yellows
            guessArr.forEach((l, i) => {
                if (states[i] !== 'correct' && targetCounts[l] > 0) {
                    states[i] = 'present';
                    targetCounts[l]--;
                }
            });

            // Animate and Color
            guessArr.forEach((l, i) => {
                const tile = grid.children[currentRow].children[i];
                setTimeout(() => {
                    tile.classList.add('flip');
                    tile.setAttribute('data-state', states[i]);
                    
                    // Update keyboard
                    const key = document.querySelector(`.key[data-key="${l.toLowerCase()}"]`);
                    if (key) {
                        const current = key.getAttribute('data-state');
                        if (states[i] === 'correct') key.setAttribute('data-state', 'correct');
                        else if (states[i] === 'present' && current !== 'correct') key.setAttribute('data-state', 'present');
                        else if (states[i] === 'absent' && current !== 'correct' && current !== 'present') key.setAttribute('data-state', 'absent');
                    }
                }, i * 250);
            });

            setTimeout(() => {
                if (guess === TARGET) {
                    showMessage("🚀 MÜKEMMEL! 🚀");
                    document.querySelector('.header h1').textContent = "GÖREV TAMAMLANDI";
                    document.querySelector('.header h1').style.color = "#22c55e";
                    grid.style.pointerEvents = 'none';
                } else if (currentRow === 5) {
                    showMessage(`Oyun bitti: ${TARGET}`);
                    grid.style.pointerEvents = 'none';
                } else {
                    currentRow++;
                    currentTile = 0;
                }
            }, 1500);
        }

        document.getElementById('keyboard').addEventListener('click', e => {
            if (e.target.classList.contains('key')) handleKey(e.target.dataset.key);
        });
        document.addEventListener('keydown', e => handleKey(e.key));
    </script>
</body>
</html>
