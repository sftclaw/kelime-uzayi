<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelime Uzayı 🚀</title>
    <style>
        :root {
            --bg: #0f172a; --text: #f8fafc; --key-bg: #334155;
            --correct: #22c55e; --present: #eab308; --absent: #1e293b;
        }
        body {
            background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0;
            overflow-x: hidden; touch-action: manipulation;
        }
        .header { text-align: center; padding: 1rem; border-bottom: 1px solid #334155; width: 100%; max-width: 500px; }
        .header h1 { margin: 0; font-size: 1.5rem; letter-spacing: 2px; background: linear-gradient(to right, #22c55e, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .grid-container {
            display: grid; grid-template-rows: repeat(6, 1fr); gap: 6px; padding: 20px;
            width: 100%; max-width: 350px; flex-grow: 1; justify-content: center;
        }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .tile {
            border: 2px solid #334155; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: bold; text-transform: uppercase; height: 60px;
            transition: all 0.3s; border-radius: 8px; background: rgba(30, 41, 59, 0.5);
        }
        .tile[data-state="correct"] { background: var(--correct); border-color: var(--correct); }
        .tile[data-state="present"] { background: var(--present); border-color: var(--present); }
        .tile[data-state="absent"] { background: var(--absent); border-color: var(--absent); }
        .tile[data-state="active"] { border-color: #94a3b8; transform: scale(1.05); }
        
        .keyboard {
            display: flex; flex-direction: column; gap: 8px; padding: 15px; width: 100%;
            max-width: 500px; background: #1e293b; border-top: 1px solid #334155;
        }
        .key-row { display: flex; justify-content: center; gap: 6px; }
        .key {
            background: var(--key-bg); color: white; border: none; padding: 15px 0;
            border-radius: 6px; cursor: pointer; font-weight: bold; flex: 1; text-transform: uppercase;
            font-size: 0.9rem; transition: background 0.2s; user-select: none;
        }
        .key.large { flex: 1.5; font-size: 0.8rem; }
        .key[data-state="correct"] { background: var(--correct); }
        .key[data-state="present"] { background: var(--present); }
        .key[data-state="absent"] { background: var(--absent); opacity: 0.5; }

        .message {
            position: absolute; top: 10%; background: white; color: black; padding: 10px 20px;
            border-radius: 4px; font-weight: bold; display: none; z-index: 10;
        }
        .stats { margin-top: 10px; font-size: 0.8rem; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="header">
        <h1>KELİME UZAYI</h1>
        <div class="stats">Galaktik Kelime Avı</div>
    </div>
    <div class="message" id="message"></div>
    
    <div class="grid-container" id="grid"></div>
    
    <div class="keyboard" id="keyboard">
        <div class="key-row">
            <button class="key" data-key="e">e</button><button class="key" data-key="r">r</button>
            <button class="key" data-key="t">t</button><button class="key" data-key="y">y</button>
            <button class="key" data-key="u">u</button><button class="key" data-key="ı">ı</button>
            <button class="key" data-key="o">o</button><button class="key" data-key="p">p</button>
            <button class="key" data-key="ğ">ğ</button><button class="key" data-key="ü">ü</button>
        </div>
        <div class="key-row">
            <button class="key" data-key="a">a</button><button class="key" data-key="s">s</button>
            <button class="key" data-key="d">d</button><button class="key" data-key="f">f</button>
            <button class="key" data-key="g">g</button><button class="key" data-key="h">h</button>
            <button class="key" data-key="j">j</button><button class="key" data-key="k">k</button>
            <button class="key" data-key="l">l</button><button class="key" data-key="ş">ş</button>
            <button class="key" data-key="i">i</button>
        </div>
        <div class="key-row">
            <button class="key large" data-key="Enter">ENTER</button>
            <button class="key" data-key="z">z</button><button class="key" data-key="c">c</button>
            <button class="key" data-key="v">v</button><button class="key" data-key="b">b</button>
            <button class="key" data-key="n">n</button><button class="key" data-key="m">m</button>
            <button class="key" data-key="ö">ö</button><button class="key" data-key="ç">ç</button>
            <button class="key large" data-key="Backspace">SİL</button>
        </div>
    </div>

 "ÖRÜMCEK", "KENE", "PİRE", "BIT", "SİVİRİSİNEK", "AT SİNİRİSİNEĞİ", "DANABURNU", "HAMAMBÖCEĞİ", "GÜVE", "İYİCEBÖCEK", "MORS", "FİL", "ASLAN", "KAPLAN", "PARS", "ÇİTA", "ZEYBRA", "GİRAAF", "MAYMUN", "GORİL", "ŞEMPANZE", "ORANGUTAN", "AYI", "KURT", "TİLKİ", "ÇAKAL", "SANCAK", "KUNDUZ", "SİNCAP", "KİRPI", "TAVŞAN", "YARASA", "FARE", "SIÇAN", "HAMSTER", "DEGU", "GERBİL", "KİRİ", "VİZN", "SANCAK", "KUMLUCA", "DENİZTİĞİ", "FOK", "MORS", "BALİNA", "YUNUS", "KÖPEKBALIĞI", "VATOZ", "AHTAPOT", "KALAMAR", "MÜREKKEPBALIĞI", "DENİZANASI", "DENİZYILDIZI", "DENİZSALYANGOZU", "DENİZKESTANESİ", "MERCAN", "SÜNGER", "YOSUN", "PAHTA", "KÖMÜR", "DEMİR", "BAKIR", "ALTIN", "GÜMÜŞ", "PLATİN", "ELMAS", "YAKUT", "ZÜMÜRÜT", "İNCİ", "AMETİST", "KUARS", "MERMER", "GRANİT", "BAZALT", "KAYAÇ", "TOPRAK", "KİL", "ÇAMUR", "KUM", "ÇAKIL", "TOPRAK", "GÜBRE", "GÜDÜK", "DAL", "YAPRAK", "ÇİÇEK", "MEYVE", "SEBZE", "TAHIL", "BAKLAGİL", "ZEYTİN", "ÜZÜM", "ELMA", "ARMUT", "AYVA", "ŞEFTALİ", "KAYISI", "ERİK", "KİRAZ", "VİŞNE", "DUT", "İNCİR", "NAR", "PORTAKAL", "MANDALİNA", "LİMON", "GREYFURT", "MUZ", "ANANAS", "KİVİ", "ÇİLEK", "AHUDUDU", "BÖĞÜRTLEN", "YABANMERSİNİ", "KARADUT", "BEYAZDUT", "CEVİZ", "FINDIK", "BADEM", "FISTIK", "ANTPEFISTIK", "KESTANE", "GEVREK", "MISIR", "BUĞDAY", "ARPА", "ÇAVDAR", "YULAF", "PİRİNÇ", "KARABİBER", "KIMYON", "PAPRİKA", "NANE", "MAYDANOZ", "DEREOTU", "REYHAN", "TARHUN", "KEKİK", "ADAÇAYI", "PAPATYA", "ISIRGAN", "EBEGÜMESİ", "HINDIBA", "RADYKKA", "TURP", "HAVUÇ", "ŞALGAM", "PANCAR", "PATATES", "TATLIPATATES", "SOĞAN", "SARIMSAK", "PİRASA", "LAHANA", "KARNABAHAR", "BROKOLİ", "MARUL", "ROKA", "TERE", "KEREVİZSAP", "ENGİNAR", "PAZU", "ISPANAK", "PATLICAN", "BİBER", "DOMATES", "SALATALIK", "KABAK", "FASULYE", "BEZELYE", "BAKLA", "NOHUT", "MERCİMEK", "BARBUNYA", "BÖRÜLCE", "MAŞ", "PIRASA", "KETEN", "SUSAM", "AYÇİÇEĞİ", "SOYA", "YERFISTIĞI", "ZEYTİNYAĞI", "AYÇİÇEĞİYAĞI", "MISIRÖZÜYAĞI", "TEREYAĞI", "İÇYAĞI", "KUYRUKYAĞI", "SÜT", "YOĞURT", "AYRAN", "KEFİR", "PEYNİR", "KAŞAR", "BEYAZPEYNİR", "LOR", "ÇÖKELEK", "TULUM", "EZİNE", "LİVANYA", "GRUYERE", "PARMESAN", "MOZZARELLA", "RICOTTA", "CREAMCHEESE", "LABNE", "KAYMAK", "BAL", "REÇEL", "MARMELAT", "PEKMEZ", "HELVA", "LOKUM", "BAKLAVA", "KADAYIF", "KÜNEFE", "SÜTLAÇ", "GÜLLAÇ", "MUHALLEBİ", "KAZANDİBİ", "TAVUKGÖĞSÜ", "FIRIN", "SÜNGER", "KEK", "PASTA", "KURABİYE", "BİSKÜVİ", "GOFRET", "ÇİKOLATA", "ŞEKER", "ŞURUP", "REÇEL", "MARMELAT", "BAL", "PEKMEZ", "HELVA", "LOKUM", "AKIDE", "SERTŞEKER", "SAKIZ", "NELİ", "ŞEKERLİ", "ÇİKOLATALI", "MEYVELİ", "KREMLİ", "DONDURMA", "SORBET", "ŞERBET", "KOMPOSTO", "HOŞAF", "MEYVESUYU", "LİMONATA", "PORTAKALSUYU", "NARHİŞİM", "GAZOZ", "KOLA", "FANTA", "SPRITE", "ENERJİİÇECEĞİ", "SU", "MADENSUYU", "SODA", "ÇAY", "KAHVE", "TÜRKKAHVESİ", "NESCAFÉ", "LİMONLUÇAY", "İHLAMUR", "ADAÇAYI", "KUŞBURNU", "ZENCEFİL", "PAPATYAÇAYI", "YEŞİLÇAY", "BEYAZÇAY", "KIRMIZIÇAY", "SİYAHÇAY", "BİTKİÇAYI", "BITKI", "AYRAN", "ŞALGAM", "BOZA", "SALEP", "TÜRKKAHVESİ", "FİNCAN", "KAŞIK", "ÇATAL", "BIÇAK", "TABAK", "KASE", "KUPA", "BARDAK", "ŞİŞE", "KAVA", "SÜRAHİ", "TEPSİ", "TEPSİ", "SİNİ", "SOFRATAKIMI", "ÇATAL", "KAŞIK", "BIÇAK", "KEPÇE", "KEVGİR", "TAVA", "TENCERE", "DÜDÜKLÜTENCERE", "FRITÖZ", "MIKRODALGA", "FIÇIN", "OCACK", "ANKASTRE", "BUZDOLABI", "DERİNDONDURUCU", "ÇAMAŞIRMKİNESİ", "BUMAMAŞİNESİ", "BULAŞIKMAKİNESİ", "ELEKTRİKSÜPÜRGESİ", "ROBOT", "MİKSER", "BLENDER", "DOĞRAYICI", "KIRMACI", "KAVURMACI", "KIZARTMA", "HAŞLAMA", "BUHARDA", "PIŞIRMA", "FIRINDA", "IZGARADA", "MANGALDA", "KÖMÜRDE", "ODUNDA", "GAZDA", "ELEKTRİKTE", "INDÜKSİYONDA"];
        
        const TARGET = words[Math.floor(Math.random() * words.length)].toUpperCase();
        let currentRow = 0;
        let currentTile = 0;
        const grid = document.getElementById('grid');

        // Initialize Grid
        for (let i = 0; i < 6; i++) {
            const row = document.createElement('div');
            row.className = 'row';
            for (let j = 0; j < 5; j++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                row.appendChild(tile);
            }
            grid.appendChild(row);
        }

        function showMessage(msg) {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 2000);
        }

        function handleKey(key) {
            if (key === 'Enter') return submitGuess();
            if (key === 'Backspace') return deleteLetter();
            if (/^[a-zA-ZğüşıöçĞÜŞİÖÇ]$/.test(key) && currentTile < 5) {
                const row = grid.children[currentRow];
                const tile = row.children[currentTile];
                tile.textContent = key.toLocaleUpperCase('tr');
                tile.setAttribute('data-state', 'active');
                currentTile++;
            }
        }

        function deleteLetter() {
            if (currentTile > 0) {
                currentTile--;
                const row = grid.children[currentRow];
                const tile = row.children[currentTile];
                tile.textContent = '';
                tile.removeAttribute('data-state');
            }
        }

        function submitGuess() {
            if (currentTile !== 5) return showMessage("Yetersiz haruf!");
            const guess = Array.from(grid.children[currentRow].children).map(t => t.textContent).join('');
            
            if (!words.includes(guess)) return showMessage("Bu kelime yok!");

            const targetArr = TARGET.split('');
            const guessArr = guess.split('');
            const row = grid.children[currentRow];
            
            // Logic for coloring
            const states = Array(5).fill('absent');
            const targetCounts = {};
            targetArr.forEach(l => targetCounts[l] = (targetCounts[l] || 0) + 1);

            // First pass: Correct (Green)
            guessArr.forEach((l, i) => {
                if (l === targetArr[i]) {
                    states[i] = 'correct';
                    targetCounts[l]--;
                }
            });

            // Second pass: Present (Yellow)
            guessArr.forEach((l, i) => {
                if (states[i] !== 'correct' && targetCounts[l] > 0) {
                    states[i] = 'present';
                    targetCounts[l]--;
                }
            });

            // Apply styles and update keyboard
            guessArr.forEach((l, i) => {
                const tile = row.children[i];
                setTimeout(() => {
                    tile.setAttribute('data-state', states[i]);
                    const key = document.querySelector(`.key[data-key="${l.toLowerCase()}"]`);
                    if (key) {
                        const current = key.getAttribute('data-state');
                        if (states[i] === 'correct') key.setAttribute('data-state', 'correct');
                        else if (states[i] === 'present' && current !== 'correct') key.setAttribute('data-state', 'present');
                        else if (states[i] === 'absent' && current !== 'correct' && current !== 'present') key.setAttribute('data-state', 'absent');
                    }
                }, i * 200);
            });

            if (guess === TARGET) {
                showMessage("TEBRİKLER! 🚀");
                this.scene && this.scene.pause();
            } else if (currentRow === 5) {
                showMessage(`Oyun bitti! Kelime: ${TARGET}`);
            } else {
                currentRow++;
                currentTile = 0;
            }
        }

        document.getElementById('keyboard').addEventListener('click', e => {
            if (e.target.classList.contains('key')) handleKey(e.target.dataset.key);
        });
        document.addEventListener('keydown', e => handleKey(e.key));
    </script>
